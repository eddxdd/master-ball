# Test and lint only. Deployment runs on AWS (CodePipeline + CodeBuild).
# See docs/aws-pipeline-setup.md for the full pipeline (test → build → deploy).
name: CI (tests only)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DIRECT_DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
